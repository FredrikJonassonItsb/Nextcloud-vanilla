user nginx;
worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # DNS resolver for dynamic hostname resolution
    resolver 127.0.0.11 valid=30s ipv6=off;

    server {
        listen ${SECUREMAIL_FRONTEND_HTTP_PORT} default_server;
        listen ${SECUREMAIL_FRONTEND_HTTPS_PORT} ssl default_server;

        server_name _;  # catch-all or replace with your domain

        http2 on;
        
        # File upload size limits for 50MB attachments
        client_max_body_size 50m;
        client_body_buffer_size 1m;
        client_body_timeout 300s;
        client_header_timeout 300s;

        # SSL certificate configuration
        ssl_certificate     /etc/ssl/securemail/securemail.crt;
        ssl_certificate_key /etc/ssl/securemail/securemail.key;

        # (Optional) Redirect all HTTP to HTTPS
        # if ($scheme = http) {
        #     return 301 https://$host:${SECUREMAIL_FRONTEND_HTTPS_PORT}$request_uri;
        # }

        # Root directory for static files
        root /usr/share/nginx/html;
        index index.html index.htm;

        # Common proxy settings at the server level, so we don't repeat ourselves
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Serve static files
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Proxy API requests
        location /api/ {
            proxy_pass http://securemail-backend:${LISTEN_PORT}$request_uri;
            
            # Proxy timeouts for large file uploads
            proxy_connect_timeout 300s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
            proxy_request_buffering off;
        }

        # Proxy WebSocket connections
        location /ws {
            # For WebSockets, explicitly set the Upgrade headers
            proxy_set_header Upgrade "websocket";
            proxy_set_header Connection "upgrade";

            # Also append $request_uri to preserve the exact path
            proxy_pass http://securemail-backend:${LISTEN_PORT}$request_uri;

            proxy_read_timeout 60m;
            proxy_send_timeout 60m;
        }
    }
}
