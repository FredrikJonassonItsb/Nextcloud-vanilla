---
build_server:
  hosts:
    main.build.server:
      ansible_host: '{{ vault_build_server_ip }}'
      ansible_user: '{{ vault_build_server_user }}'

deploy_development_servers:
  hosts:
    itsl2.demo.hubs.se:
      ansible_host: '{{ vault_itsl2_demo_server_ip }}'
      ansible_user: '{{ vault_itsl2_demo_server_user }}'
      ansible_ssh_private_key_file: '{{ vault_itsl2_demo_server_ssh_key_path }}'
      container_name: '{{ vault_itsl2_demo_server_container_name }}'
deploy_production_servers:
  hosts:
    samverka.hubs.se:
      ansible_host: '{{ vault_samverka_server_ip }}'
      ansible_user: '{{ vault_samverka_server_user }}'
      ansible_ssh_private_key_file: '{{ vault_samverka_server_ssh_key_path }}'
      container_name: '{{ vault_samverka_server_container_name }}'

all:
  vars:
    ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
