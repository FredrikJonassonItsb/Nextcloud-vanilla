    ]]></style><filter height="140%" id="softShadow" width="140%" x="-20%" y="-20%"><feGaussianBlur in="SourceAlpha" stdDeviation="3" /><feOffset dx="0" dy="3" in="SourceGraphic" result="offsetblur" /><feMerge><feMergeNode in="offsetblur" /><feMergeNode in="SourceGraphic" /></feMerge><feMerge><feMergeNode in="offsetblur" /><feMergeNode in="SourceGraphic" /></feMerge></filter><filter height="120%" id="cardShadow" width="120%" x="-10%" y="-10%"><feGaussianBlur in="SourceAlpha" stdDeviation="1.7" /><feOffset dx="0" dy="2" in="SourceGraphic" result="off" /><feMerge><feMergeNode in="off" /><feMergeNode in="SourceGraphic" /></feMerge><feMerge><feMergeNode in="off" /><feMergeNode in="SourceGraphic" /></feMerge></filter></defs><rect fill="#FFFFFF" height="900" width="1600" x="0" y="0" /><rect fill="#0B1F3A" height="7" width="1600" x="0" y="0" /><rect fill="#245BFF" height="2" width="1600" x="0" y="7" /><text class="micro" text-anchor="start" x="70" y="68"><tspan dy="0" x="70">HUBS / RAPPORTFIGUR 05</tspan></text><text fill="#101828" font-family="Inter, Lato, Arial, sans-serif" font-size="40" font-weight="800" text-anchor="start" x="70" y="122"><tspan dy="0" x="70">Tom kö, synlig frist, kvittens</tspan></text><text fill="#475467" font-family="Inter, Lato, Arial, sans-serif" font-size="19" font-weight="400" text-anchor="start" x="70" y="164"><tspan dy="0" x="70">Riskreduktion kan uttryckas som tre enkla kontrollprinciper som ledning och verksamhet kan följa upp.</tspan></text><rect fill="#FFFFFF" filter="url(#cardShadow)" height="465" opacity="0.98" rx="28" ry="28" stroke="#EAECF0" stroke-width="1.0" width="460" x="70" y="245" /><rect fill="#245BFF" height="8" rx="4" ry="4" width="460" x="70" y="245" /><circle cx="155" cy="340" fill="#EAF0FF" r="55" stroke="none" /><g fill="none" stroke="#245BFF" stroke-linecap="round" stroke-linejoin="round" stroke-width="3"><rect height="9.719999999999999" rx="2" width="45.36" x="132.32" y="317.86" /><rect height="9.719999999999999" rx="2" width="45.36" x="132.32" y="335.14" /><rect height="9.719999999999999" rx="2" width="45.36" x="132.32" y="352.42" /><circle cx="184.7" cy="320.56" fill="#245BFF" r="5.4" stroke="#245BFF" /></g><text fill="#101828" font-family="Inter, Lato, Arial, sans-serif" font-size="36" font-weight="900" text-anchor="start" x="118" y="450"><tspan dy="0" x="118">Tom kö</tspan></text><text fill="#245BFF" font-family="Inter, Lato, Arial, sans-serif" font-size="28" font-weight="800" text-anchor="start" x="118" y="498"><tspan dy="0" x="118">= inget otilldelat</tspan></text><text fill="#475467" font-family="Inter, Lato, Arial, sans-serif" font-size="18" font-weight="400" text-anchor="start" x="118" y="565"><tspan dy="0" x="118">Ärenden har ägare. Inga känsliga</tspan><tspan dy="22.5" x="118">inflöden ligger utan ansvar.</tspan></text><rect fill="#FFFFFF" filter="url(#cardShadow)" height="465" opacity="0.98" rx="28" ry="28" stroke="#EAECF0" stroke-width="1.0" width="460" x="570" y="245" /><rect fill="#B86B00" height="8" rx="4" ry="4" width="460" x="570" y="245" /><circle cx="655" cy="340" fill="#FFF4E5" r="55" stroke="none" /><g fill="none" stroke="#B86B00" stroke-linecap="round" stroke-linejoin="round" stroke-width="3"><circle cx="655" cy="340" r="24.3" /><line x1="655" x2="655" y1="340" y2="326.5" /><line x1="655" x2="667.42" y1="340" y2="347.02" /></g><text fill="#101828" font-family="Inter, Lato, Arial, sans-serif" font-size="36" font-weight="900" text-anchor="start" x="618" y="450"><tspan dy="0" x="618">Synlig frist</tspan></text><text fill="#B86B00" font-family="Inter, Lato, Arial, sans-serif" font-size="28" font-weight="800" text-anchor="start" x="618" y="498"><tspan dy="0" x="618">= inget dolt</tspan></text><text fill="#475467" font-family="Inter, Lato, Arial, sans-serif" font-size="18" font-weight="400" text-anchor="start" x="618" y="565"><tspan dy="0" x="618">Tidskritiska steg räknar ned i</tspan><tspan dy="22.5" x="618">ärendet – inte i minnet.</tspan></text><rect fill="#FFFFFF" filter="url(#cardShadow)" height="465" opacity="0.98" rx="28" ry="28" stroke="#EAECF0" stroke-width="1.0" width="460" x="1070" y="245" /><rect fill="#138A5B" height="8" rx="4" ry="4" width="460" x="1070" y="245" /><circle cx="1155" cy="340" fill="#E8F6EF" r="55" stroke="none" /><g fill="none" stroke="#138A5B" stroke-linecap="round" stroke-linejoin="round" stroke-width="3"><circle cx="1155" cy="340" r="24.84" /><path d="M 1144.2 341.08 L 1153.92 350.8 L 1170.12 328.12" /></g><text fill="#101828" font-family="Inter, Lato, Arial, sans-serif" font-size="36" font-weight="900" text-anchor="start" x="1118" y="450"><tspan dy="0" x="1118">Kvittens</tspan></text><text fill="#138A5B" font-family="Inter, Lato, Arial, sans-serif" font-size="28" font-weight="800" text-anchor="start" x="1118" y="498"><tspan dy="0" x="1118">= inget gissande</tspan></text><text fill="#475467" font-family="Inter, Lato, Arial, sans-serif" font-size="18" font-weight="400" text-anchor="start" x="1118" y="565"><tspan dy="0" x="1118">Kommunen ser om informationen är</tspan><tspan dy="22.5" x="1118">skickad, levererad, öppnad och läst.</tspan></text><rect fill="#0B1F3A" height="58" rx="20" ry="20" stroke="none" stroke-width="1.0" width="1460" x="70" y="755" /><text fill="#FFFFFF" font-family="Inter, Lato, Arial, sans-serif" font-size="19" font-weight="800" text-anchor="start" x="105" y="792"><tspan dy="0" x="105">Ledningspoängen: kommunen kan visa vad som är mottaget, tilldelat, bevakat och överfört.</tspan></text><line stroke="#EAECF0" stroke-width="1" x1="70" x2="1530" y1="830" y2="830" /><text fill="#667085" font-family="Inter, Lato, Arial, sans-serif" font-size="14" font-weight="400" text-anchor="start" x="70" y="862"><tspan dy="0" x="70">Caption: Den största vinsten är inte bara sparad tid, utan att kommunen kan visa kontroll över mottagning, ansvar, frist och leverans.</tspan></text></svg>