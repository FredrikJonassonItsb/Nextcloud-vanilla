F" points="535,440 523.7416697508023,446.5 523.7416697508023,433.5" /><line fill="none" stroke="#245BFF" stroke-linecap="round" stroke-width="3.5" x1="1055" x2="1145" y1="440" y2="440" /><polygon fill="#245BFF" points="1145,440 1133.7416697508022,446.5 1133.7416697508022,433.5" /><text fill="#245BFF" font-family="Inter, Lato, Arial, sans-serif" font-size="12" font-weight="800" text-anchor="middle" x="467" y="415"><tspan dy="0" x="467">Operativt</tspan><tspan dy="15.0" x="467">arbete</tspan></text><text fill="#245BFF" font-family="Inter, Lato, Arial, sans-serif" font-size="12" font-weight="800" text-anchor="middle" x="1098" y="415"><tspan dy="0" x="1098">Styrd</tspan><tspan dy="15.0" x="1098">överföring</tspan></text><rect fill="#EAF0FF" height="82" rx="20" ry="20" stroke="none" stroke-width="1.0" width="1460" x="70" y="710" /><text fill="#245BFF" font-family="Inter, Lato, Arial, sans-serif" font-size="18" font-weight="800" text-anchor="start" x="105" y="746"><tspan dy="0" x="105">Kärnprincip:</tspan></text><text fill="#101828" font-family="Inter, Lato, Arial, sans-serif" font-size="20" font-weight="800" text-anchor="start" x="235" y="746"><tspan dy="0" x="235">Hubs tar ansvar för övergångarna. Facksystem, diarium och e-arkiv förblir den formella källan.</tspan></text><line stroke="#EAECF0" stroke-width="1" x1="70" x2="1530" y1="830" y2="830" /><text fill="#667085" font-family="Inter, Lato, Arial, sans-serif" font-size="14" font-weight="400" text-anchor="start" x="70" y="862"><tspan dy="0" x="70">Caption: Hubs tar ansvar för det operativa arbetet mellan inkommande kanal och formell slutlagring.</tspan></text></svg>