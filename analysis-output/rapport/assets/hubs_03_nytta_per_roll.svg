span></text><line stroke="#31496A" stroke-width="1" x1="330" x2="330" y1="242" y2="280" /><text fill="#FFFFFF" font-family="Inter, Lato, Arial, sans-serif" font-size="16" font-weight="800" text-anchor="start" x="742" y="269"><tspan dy="0" x="742">Hubs-funktion</tspan></text><line stroke="#31496A" stroke-width="1" x1="720" x2="720" y1="242" y2="280" /><text fill="#FFFFFF" font-family="Inter, Lato, Arial, sans-serif" font-size="16" font-weight="800" text-anchor="start" x="1132" y="269"><tspan dy="0" x="1132">Ledningsnytta</tspan></text><line stroke="#31496A" stroke-width="1" x1="1110" x2="1110" y1="242" y2="280" /><rect fill="#FFFFFF" height="77" rx="14" ry="14" stroke="#EAECF0" stroke-width="1.0" width="1460" x="70" y="300" /><g fill="none" stroke="#245BFF" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2"><circle cx="101" cy="330.56" r="6.16" /><path d="M 87.0 350.16 Q 101 339.8 115.0 350.16" /></g><text fill="#101828" font-family="Inter, Lato, Arial, sans-serif" font-size="16" font-weight="800" text-anchor="start" x="132" y="333"><tspan dy="0" x="132">Socialsekreterare</tspan></text><line stroke="#EAECF0" stroke-width="1" x1="330" x2="330" y1="313" y2="364" /><text fill="#475467" font-family="Inter, Lato, Arial, sans-serif" font-size="15" font-weight="400" text-anchor="start" x="352" y="331"><tspan dy="0" x="352">Orosanmälningar i flera kanaler, hårda</tspan><tspan dy="17.549999999999997" x="352">frister</tspan></text><line stroke="#EAECF0" stroke-width="1" x1="720" x2="720" y1="313" y2="364" /><text fill="#101828" font-family="Inter, Lato, Arial, sans-serif" font-size="15" font-weight="800" text-anchor="start" x="742" y="331"><tspan dy="0" x="742">Gemensam åtgärdskö + fristklocka</tspan></text><line stroke="#EAECF0" stroke-width="1" x1="1110" x2="1110" y1="313" y2="364" /><text fill="#245BFF" font-family="Inter, Lato, Arial, sans-serif" font-size="15" font-weight="800" text-anchor="start" x="1132" y="331"><tspan dy="0" x="1132">Mindre risk att barn och frister faller mellan</tspan><tspan dy="17.549999999999997" x="1132">system</tspan></text><rect fill="#FCFCFD" height="77" rx="14" ry="14" stroke="#EAECF0" stroke-width="1.0" width="1460" x="70" y="382" /><g fill="none" stroke="#245BFF" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2"><path d="M 91.2 403.6 H 106.04 L 112.76 410.32 V 434.4 H 91.2 Z" /><line x1="95.4" x2="107.16" y1="415.64" y2="415.64" /><line x1="95.4" x2="107.16" y1="421.24" y2="421.24" /><line x1="95.4" x2="103.24" y1="426.84" y2="426.84" /></g><text fill="#101828" font-family="Inter, Lato, Arial, sans-serif" font-size="16" font-weight="800" text-anchor="start" x="132" y="415"><tspan dy="0" x="132">Registrator</tspan></text><line stroke="#EAECF0" stroke-width="1" x1="330" x2="330" y1="395" y2="446" /><text fill="#475467" font-family="Inter, Lato, Arial, sans-serif" font-size="15" font-weight="400" text-anchor="start" x="352" y="413"><tspan dy="0" x="352">Hög volym, otydlig status, manuell</tspan><tspan dy="17.549999999999997" x="352">fördelning</tspan></text><line stroke="#EAECF0" stroke-width="1" x1="720" x2="720" y1="395" y2="446" /><text fill="#101828" font-family="Inter, Lato, Arial, sans-serif" font-size="15" font-weight="800" text-anchor="start" x="742" y="413"><tspan dy="0" x="742">Samlad kö + ärendekoppling + tilldelning</tspan></text><line stroke="#EAECF0" stroke-width="1" x1="1110" x2="1110" y1="395" y2="446" /><text fill="#245BFF" font-family="Inter, Lato, Arial, sans-serif" font-size="15" font-weight="800" text-anchor="start" x="1132" y="413"><tspan dy="0" x="1132">Kortare ledtid och bättre spårbarhet</tspan></text><rect fill="#FFFFFF" height="77" rx="14" ry="14" stroke="#EAECF0" stroke-width="1.0" width="1460" x="70" y="464" /><g fill="none" stroke="#245BFF" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2"><circle cx="93.72" cy="497.64" r="4.48" /><circle cx="108.28" cy="497.64" r="4.48" /><path d="M 85.6 514.44 Q 93.44 504.36 101 514.44" /><path d="M 101 514.44 Q 108.56 504.36 116.4 514.44" /></g><text fill="#101828" font-family="Inter, Lato, Arial, sans-serif" font-size="16" font-weight="800" text-anchor="start" x="132" y="497"><tspan dy="0" x="132">HSL / sjuksköterska</tspan></text><line stroke="#EAECF0" stroke-width="1" x1="330" x2="330" y1="477" y2="528" /><text fill="#475467" font-family="Inter, Lato, Arial, sans-serif" font-size="15" font-weight="400" text-anchor="start" x="352" y="495"><tspan dy="0" x="352">Regionflöden, SIP, faxliknande kvittenser</tspan></text><line stroke="#EAECF0" stroke-width="1" x1="720" x2="720" y1="477" y2="528" /><text fill="#101828" font-family="Inter, Lato, Arial, sans-serif" font-size="15" font-weight="800" text-anchor="start" x="742" y="495"><tspan dy="0" x="742">Säkra möten + leveransstatus i ärendet</tspan></text><line stroke="#EAECF0" stroke-width="1" x1="1110" x2="1110" y1="477" y2="528" /><text fill="#245BFF" font-family="Inter, Lato, Arial, sans-serif" font-size="15" font-weight="800" text-anchor="start" x="1132" y="495"><tspan dy="0" x="1132">Tryggare samverkan och mindre</tspan><tspan dy="17.549999999999997" x="1132">dokumentationsskuld</tspan></text><rect fill="#FCFCFD" height="77" rx="14" ry="14" stroke="#EAECF0" stroke-width="1.0" width="1460" x="70" y="546" /><g fill="none" stroke="#245BFF" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2"><path d="M 101 567.6 L 113.6 573.48 V 584.4 Q 110.52 593.64 101 598.4 Q 91.48 593.64 88.4 584.4 V 573.48 Z" /><path d="M 95.96 583.56 L 99.88 587.48 L 107.16 577.96" /></g><text fill="#101828" font-family="Inter, Lato, Arial, sans-serif" font-size="16" font-weight="800" text-anchor="start" x="132" y="579"><tspan dy="0" x="132">HR / chef</tspan></text><line stroke="#EAECF0" stroke-width="1" x1="330" x2="330" y1="559" y2="610" /><text fill="#475467" font-family="Inter, Lato, Arial, sans-serif" font-size="15" font-weight="400" text-anchor="start" x="352" y="577"><tspan dy="0" x="352">Hälsodata och rehabärenden i spridda kanaler</tspan></text><line stroke="#EAECF0" stroke-width="1" x1="720" x2="720" y1="559" y2="610" /><text fill="#101828" font-family="Inter, Lato, Arial, sans-serif" font-size="15" font-weight="800" text-anchor="start" x="742" y="577"><tspan dy="0" x="742">Avskilt rehabrum med behörighet och</tspan><tspan dy="17.549999999999997" x="742">bevakning</tspan></text><line stroke="#EAECF0" stroke-width="1" x1="1110" x2="1110" y1="559" y2="610" /><text fill="#245BFF" font-family="Inter, Lato, Arial, sans-serif" font-size="15" font-weight="800" text-anchor="start" x="1132" y="577"><tspan dy="0" x="1132">Lägre sekretessrisk och bättre intern kontroll</tspan></text><rect fill="#FFFFFF" height="77" rx="14" ry="14" stroke="#EAECF0" stroke-width="1.0" width="1460" x="70" y="628" /><g fill="none" stroke="#245BFF" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2"><line x1="101" x2="101" y1="651.56" y2="676.76" /><line x1="90.36" x2="111.64" y1="658.84" y2="658.84" /><path d="M 90.36 658.84 L 85.6 669.2 H 95.4 Z" /><path d="M 111.64 658.84 L 106.6 669.2 H 116.4 Z" /><line x1="93.16" x2="108.84" y1="678.44" y2="678.44" /></g><text fill="#101828" font-family="Inter, Lato, Arial, sans-serif" font-size="16" font-weight="800" text-anchor="start" x="132" y="661"><tspan dy="0" x="132">Överförmyndare</tspan></text><line stroke="#EAECF0" stroke-width="1" x1="330" x2="330" y1="641" y2="692" /><text fill="#475467" font-family="Inter, Lato, Arial, sans-serif" font-size="15" font-weight="400" text-anchor="start" x="352" y="659"><tspan dy="0" x="352">Årsräkningar, kompletteringar och</tspan><tspan dy="17.549999999999997" x="352">toppbelastning</tspan></text><line stroke="#EAECF0" stroke-width="1" x1="720" x2="720" y1="641" y2="692" /><text fill="#101828" font-family="Inter, Lato, Arial, sans-serif" font-size="15" font-weight="800" text-anchor="start" x="742" y="659"><tspan dy="0" x="742">Granskningskö + deadline-driven</tspan><tspan dy="17.549999999999997" x="742">komplettering</tspan></text><line stroke="#EAECF0" stroke-width="1" x1="1110" x2="1110" y1="641" y2="692" /><text fill="#245BFF" font-family="Inter, Lato, Arial, sans-serif" font-size="15" font-weight="800" text-anchor="start" x="1132" y="659"><tspan dy="0" x="1132">Kontroll över belastning och frister</tspan></text><rect fill="#FCFCFD" height="77" rx="14" ry="14" stroke="#EAECF0" stroke-width="1.0" width="1460" x="70" y="710" /><g fill="none" stroke="#245BFF" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2"><circle cx="101" cy="747" fill="#245BFF" r="5.04" stroke="#245BFF" /><circle cx="116.4" cy="747.0" r="3.64" /><line x1="101" x2="116.4" y1="747" y2="747.0" /><circle cx="93.3" cy="760.3367912182804" r="3.64" /><line x1="101" x2="93.3" y1="747" y2="760.3367912182804" /><circle cx="93.3" cy="733.6632087817196" r="3.64" /><line x1="101" x2="93.3" y1="747" y2="733.6632087817196" /></g><text fill="#101828" font-family="Inter, Lato, Arial, sans-serif" font-size="16" font-weight="800" text-anchor="start" x="132" y="743"><tspan dy="0" x="132">IT /</tspan><tspan dy="16.8" x="132">informationssäkerhet</tspan></text><line stroke="#EAECF0" stroke-width="1" x1="330" x2="330" y1="723" y2="774" /><text fill="#475467" font-family="Inter, Lato, Arial, sans-serif" font-size="15" font-weight="400" text-anchor="start" x="352" y="741"><tspan dy="0" x="352">Efterlevnad måste bevisas via flera system</tspan></text><line stroke="#EAECF0" stroke-width="1" x1="720" x2="720" y1="723" y2="774" /><text fill="#101828" font-family="Inter, Lato, Arial, sans-serif" font-size="15" font-weight="800" text-anchor="start" x="742" y="741"><tspan dy="0" x="742">Samlad status, logg, kvittens och</tspan><tspan dy="17.549999999999997" x="742">gallringsflöde</tspan></text><line stroke="#EAECF0" stroke-width="1" x1="1110" x2="1110" y1="723" y2="774" /><text fill="#245BFF" font-family="Inter, Lato, Arial, sans-serif" font-size="15" font-weight="800" text-anchor="start" x="1132" y="741"><tspan dy="0" x="1132">Bevisbar styrning, rapportering och</tspan><tspan dy="17.549999999999997" x="1132">incidentuppföljning</tspan></text><line stroke="#EAECF0" stroke-width="1" x1="70" x2="1530" y1="830" y2="830" /><text fill="#667085" font-family="Inter, Lato, Arial, sans-serif" font-size="14" font-weight="400" text-anchor="start" x="70" y="862"><tspan dy="0" x="70">Caption: Samma motor kan stödja socialtjänst, registratur, HSL, HR, överförmyndare och informationssäkerhet med rollstyrda profiler.</tspan></text></svg>