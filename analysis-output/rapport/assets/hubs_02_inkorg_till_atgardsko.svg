    ]]></style><filter height="140%" id="softShadow" width="140%" x="-20%" y="-20%"><feGaussianBlur in="SourceAlpha" stdDeviation="3" /><feOffset dx="0" dy="3" in="SourceGraphic" result="offsetblur" /><feMerge><feMergeNode in="offsetblur" /><feMergeNode in="SourceGraphic" /></feMerge><feMerge><feMergeNode in="offsetblur" /><feMergeNode in="SourceGraphic" /></feMerge></filter><filter height="120%" id="cardShadow" width="120%" x="-10%" y="-10%"><feGaussianBlur in="SourceAlpha" stdDeviation="1.7" /><feOffset dx="0" dy="2" in="SourceGraphic" result="off" /><feMerge><feMergeNode in="off" /><feMergeNode in="SourceGraphic" /></feMerge><feMerge><feMergeNode in="off" /><feMergeNode in="SourceGraphic" /></feMerge></filter></defs><rect fill="#FFFFFF" height="900" width="1600" x="0" y="0" /><rect fill="#0B1F3A" height="7" width="1600" x="0" y="0" /><rect fill="#245BFF" height="2" width="1600" x="0" y="7" /><text class="micro" text-anchor="start" x="70" y="68"><tspan dy="0" x="70">HUBS / RAPPORTFIGUR 02</tspan></text><text fill="#101828" font-family="Inter, Lato, Arial, sans-serif" font-size="40" font-weight="800" text-anchor="start" x="70" y="122"><tspan dy="0" x="70">Från inkorg till åtgärdskö</tspan></text><text fill="#475467" font-family="Inter, Lato, Arial, sans-serif" font-size="19" font-weight="400" text-anchor="start" x="70" y="164"><tspan dy="0" x="70">Skiftet är inte bara en ny vy. Det flyttar manuella handläggarbeslut till styrda åtgärder.</tspan></text><rect fill="#F8FAFC" filter="url(#cardShadow)" height="88" opacity="0.98" rx="24" ry="24" stroke="#EAECF0" stroke-width="1.0" width="700" x="70" y="210" /><rect fill="#0B1F3A" filter="url(#cardShadow)" height="88" opacity="0.98" rx="24" ry="24" stroke="#0B1F3A" stroke-width="1.0" width="700" x="830" y="210" /><g fill="none" stroke="#475467" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2"><rect height="21.599999999999998" rx="3" ry="3" width="33.0" x="98.5" y="243.2" /><path d="M 98.5 244.4 L 115 256.4 L 131.5 244.4" /></g><text fill="#101828" font-family="Inter, Lato, Arial, sans-serif" font-size="27" font-weight="800" text-anchor="start" x="155" y="248"><tspan dy="0" x="155">Vanlig inkorg</tspan></text><text fill="#667085" font-family="Inter, Lato, Arial, sans-serif" font-size="15" font-weight="400" text-anchor="start" x="155" y="277"><tspan dy="0" x="155">Information först: användaren måste tolka listan.</tspan></text><g fill="none" stroke="#AFC4FF" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2"><rect height="5.3999999999999995" rx="2" width="25.2" x="862.4" y="241.70000000000002" /><rect height="5.3999999999999995" rx="2" width="25.2" x="862.4" y="251.3" /><rect height="5.3999999999999995" rx="2" width="25.2" x="862.4" y="260.90000000000003" /><circle cx="891.5" cy="243.2" fill="#AFC4FF" r="3.0" stroke="#AFC4FF" /></g><text fill="#FFFFFF" font-family="Inter, Lato, Arial, sans-serif" font-size="27" font-weight="800" text-anchor="start" x="915" y="248"><tspan dy="0" x="915">Operativt verksamhetslager</tspan></text><text fill="#C8D4E8" font-family="Inter, Lato, Arial, sans-serif" font-size="15" font-weight="400" text-anchor="start" x="915" y="277"><tspan dy="0" x="915">Åtgärd först: systemet visar nästa sak som kräver beslut.</tspan></text><rect fill="#FFFFFF" height="75" rx="15" ry="15" stroke="#EAECF0" stroke-width="1.0" width="1460" x="70" y="335" /><rect fill="#F2F4F7" height="34" rx="17" ry="17" stroke="none" stroke-width="1.0" width="150" x="95" y="354" /><text fill="#101828" font-family="Inter, Lato, Arial, sans-serif" font-size="14" font-weight="800" text-anchor="middle" x="170" y="377"><tspan dy="0" x="170">Kanalval</tspan></text><text fill="#475467" font-family="Inter, Lato, Arial, sans-serif" font-size="17" font-weight="400" text-anchor="start" x="285" y="373"><tspan dy="0" x="285">Handläggaren väljer kanal manuellt.</tspan></text><line fill="none" stroke="#245BFF" stroke-linecap="round" stroke-width="2.6" x1="760" x2="825" y1="372" y2="372" /><polygon fill="#245BFF" points="825,372 813.7416697508023,378.5 813.7416697508023,365.5" /><text fill="#101828" font-family="Inter, Lato, Arial, sans-serif" font-size="17" font-weight="700" text-anchor="start" x="865" y="373"><tspan dy="0" x="865">Systemet föreslår eller väljer säker kanal.</tspan></text><rect fill="#FCFCFD" height="75" rx="15" ry="15" stroke="#EAECF0" stroke-width="1.0" width="1460" x="70" y="418" /><rect fill="#F2F4F7" height="34" rx="17" ry="17" stroke="none" stroke-width="1.0" width="150" x="95" y="437" /><text fill="#101828" font-family="Inter, Lato, Arial, sans-serif" font-size="14" font-weight="800" text-anchor="middle" x="170" y="460"><tspan dy="0" x="170">Frist</tspan></text><text fill="#475467" font-family="Inter, Lato, Arial, sans-serif" font-size="17" font-weight="400" text-anchor="start" x="285" y="456"><tspan dy="0" x="285">Frister ligger i kalender, minne eller lokal</tspan><tspan dy="19.549999999999997" x="285">lista.</tspan></text><line fill="none" stroke="#245BFF" stroke-linecap="round" stroke-width="2.6" x1="760" x2="825" y1="455" y2="455" /><polygon fill="#245BFF" points="825,455 813.7416697508023,461.5 813.7416697508023,448.5" /><text fill="#101828" font-family="Inter, Lato, Arial, sans-serif" font-size="17" font-weight="700" text-anchor="start" x="865" y="456"><tspan dy="0" x="865">Frist räknar ned i ärendet och kopplas till ansvarig.</tspan></text><rect fill="#FFFFFF" height="75" rx="15" ry="15" stroke="#EAECF0" stroke-width="1.0" width="1460" x="70" y="501" /><rect fill="#F2F4F7" height="34" rx="17" ry="17" stroke="none" stroke-width="1.0" width="150" x="95" y="520" /><text fill="#101828" font-family="Inter, Lato, Arial, sans-serif" font-size="14" font-weight="800" text-anchor="middle" x="170" y="543"><tspan dy="0" x="170">Kvittens</tspan></text><text fill="#475467" font-family="Inter, Lato, Arial, sans-serif" font-size="17" font-weight="400" text-anchor="start" x="285" y="539"><tspan dy="0" x="285">Leverans kontrolleras genom att leta, ringa</tspan><tspan dy="19.549999999999997" x="285">eller fråga.</tspan></text><line fill="none" stroke="#245BFF" stroke-linecap="round" stroke-width="2.6" x1="760" x2="825" y1="538" y2="538" /><polygon fill="#245BFF" points="825,538 813.7416697508023,544.5 813.7416697508023,531.5" /><text fill="#101828" font-family="Inter, Lato, Arial, sans-serif" font-size="17" font-weight="700" text-anchor="start" x="865" y="539"><tspan dy="0" x="865">Status visas som en del av ärendet.</tspan></text><rect fill="#FCFCFD" height="75" rx="15" ry="15" stroke="#EAECF0" stroke-width="1.0" width="1460" x="70" y="584" /><rect fill="#F2F4F7" height="34" rx="17" ry="17" stroke="none" stroke-width="1.0" width="150" x="95" y="603" /><text fill="#101828" font-family="Inter, Lato, Arial, sans-serif" font-size="14" font-weight="800" text-anchor="middle" x="170" y="626"><tspan dy="0" x="170">Arbetsrum</tspan></text><text fill="#475467" font-family="Inter, Lato, Arial, sans-serif" font-size="17" font-weight="400" text-anchor="start" x="285" y="622"><tspan dy="0" x="285">Mappar och behörigheter skapas manuellt.</tspan></text><line fill="none" stroke="#245BFF" stroke-linecap="round" stroke-width="2.6" x1="760" x2="825" y1="621" y2="621" /><polygon fill="#245BFF" points="825,621 813.7416697508023,627.5 813.7416697508023,614.5" /><text fill="#101828" font-family="Inter, Lato, Arial, sans-serif" font-size="17" font-weight="700" text-anchor="start" x="865" y="622"><tspan dy="0" x="865">Arbetsrum, behörighet och gallringsregel skapas i flödet.</tspan></text><rect fill="#FFFFFF" height="75" rx="15" ry="15" stroke="#EAECF0" stroke-width="1.0" width="1460" x="70" y="667" /><rect fill="#F2F4F7" height="34" rx="17" ry="17" stroke="none" stroke-width="1.0" width="150" x="95" y="686" /><text fill="#101828" font-family="Inter, Lato, Arial, sans-serif" font-size="14" font-weight="800" text-anchor="middle" x="170" y="709"><tspan dy="0" x="170">Överföring</tspan></text><text fill="#475467" font-family="Inter, Lato, Arial, sans-serif" font-size="17" font-weight="400" text-anchor="start" x="285" y="705"><tspan dy="0" x="285">Facksystemet uppdateras när någon hinner föra</tspan><tspan dy="19.549999999999997" x="285">över.</tspan></text><line fill="none" stroke="#245BFF" stroke-linecap="round" stroke-width="2.6" x1="760" x2="825" y1="704" y2="704" /><polygon fill="#245BFF" points="825,704 813.7416697508023,710.5 813.7416697508023,697.5" /><text fill="#101828" font-family="Inter, Lato, Arial, sans-serif" font-size="17" font-weight="700" text-anchor="start" x="865" y="705"><tspan dy="0" x="865">Överföring blir en styrd och kvitterad process.</tspan></text><rect fill="#EAF0FF" height="38" rx="19" ry="19" stroke="none" stroke-width="1.0" width="1460" x="70" y="777" /><text fill="#245BFF" font-family="Inter, Lato, Arial, sans-serif" font-size="16" font-weight="800" text-anchor="start" x="100" y="803"><tspan dy="0" x="100">Poäng: Hubs minskar friktion genom att göra återkommande beslut till styrda åtgärder.</tspan></text><line stroke="#EAECF0" stroke-width="1" x1="70" x2="1530" y1="830" y2="830" /><text fill="#667085" font-family="Inter, Lato, Arial, sans-serif" font-size="14" font-weight="400" text-anchor="start" x="70" y="862"><tspan dy="0" x="70">Caption: Hubs gör återkommande handläggarbeslut — kanal, frist, kvittens, arbetsrum och överföring — till styrda åtgärder.</tspan></text></svg>