<?xml version="1.0" encoding="utf-8" ?>
<svg baseProfile="full" height="900px" version="1.1" viewBox="0 0 1600 900" width="1600px" xmlns="http://www.w3.org/2000/svg" xmlns:ev="http://www.w3.org/2001/xml-events" xmlns:xlink="http://www.w3.org/1999/xlink"><defs><style type="text/css"><![CDATA[
    text { font-family: Inter, Lato, Arial, sans-serif; }
    .micro { font-size: 14px; letter-spacing: 1.6px; font-weight: 700; text-transform: uppercase; fill: #245BFF; }
    .title { font-size: 40px; font-weight: 760; fill: #101828; }
    .subtitle { font-size: 20px; font-weight: 400; fill: #475467; }
    .h2 { font-size: 24px; font-weight: 760; fill: #101828; }
    .h3 { font-size: 18px; font-weight: 760; fill: #101828; }
    .body { font-size: 16px; font-weight: 430; fill: #475467; }
    .small { font-size: 13px; font-weight: 450; fill: #667085; }
    .metric { font-size: 42px; font-weight: 800; fill: #101828; }
    ]]></style><filter height="140%" id="softShadow" width="140%" x="-20%" y="-20%"><feGaussianBlur in="SourceAlpha" stdDeviation="3" /><feOffset dx="0" dy="3" in="SourceGraphic" result="offsetblur" /><feMerge><feMergeNode in="offsetblur" /><feMergeNode in="SourceGraphic" /></feMerge><feMerge><feMergeNode in="offsetblur" /><feMergeNode in="SourceGraphic" /></feMerge></filter><filter height="120%" id="cardShadow" width="120%" x="-10%" y="-10%"><feGaussianBlur in="SourceAlpha" stdDeviation="1.7" /><feOffset dx="0" dy="2" in="SourceGraphic" result="off" /><feMerge><feMergeNode in="off" /><feMergeNode in="SourceGraphic" /></feMerge><feMerge><feMergeNode in="off" /><feMergeNode in="SourceGraphic" /></feMerge></filter></defs><rect fill="#FFFFFF" height="900" width="1600" x="0" y="0" /><rect fill="#0B1F3A" height="7" width="1600" x="0" y="0" /><rect fill="#245BFF" height="2" width="1600" x="0" y="7" /><text class="micro" text-anchor="start" x="70" y="68"><tspan dy="0" x="70">HUBS / RAPPORTFIGUR 06</tspan></text><text fill="#101828" font-family="Inter, Lato, Arial, sans-serif" font-size="40" font-weight="800" text-anchor="start" x="70" y="122"><tspan dy="0" x="70">Införande i tre steg</tspan></text><text fill="#475467" font-family="Inter, Lato, Arial, sans-serif" font-size="19" font-weight="400" text-anchor="start" x="70" y="164"><tspan dy="0" x="70">Gör beslutet mindre riskfyllt: börja smalt, mät effekten och skala först när nytta och risk är verifierade.</tspan></text><rect fill="#FFFFFF" filter="url(#cardShadow)" height="485" opacity="0.98" rx="28" ry="28" stroke="#EAECF0" stroke-width="1.0" width="460" x="70" y="245" /><rect fill="#245BFF" height="8" rx="4" ry="4" width="460" x="70" y="245" /><circle cx="132" cy="317" fill="#EAF0FF" r="30" stroke="none" /><text fill="#245BFF" font-family="Inter, Lato, Arial, sans-serif" font-size="28" font-weight="900" text-anchor="middle" x="132" y="328"><tspan dy="0" x="132">1</tspan></text><text fill="#101828" font-family="Inter, Lato, Arial, sans-serif" font-size="26" font-weight="900" text-anchor="start" x="175" y="323"><tspan dy="0" x="175">Avgränsa &amp; mät</tspan></text><rect fill="#EAF0FF" height="118" rx="18" ry="18" stroke="none" stroke-width="1.0" width="380" x="110" y="390" /><g fill="none" stroke="#245BFF" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2"><line x1="132.9" x2="132.9" y1="415.0" y2="441.52" /><path d="M 132.9 415.78 H 152.92 L 147.72 422.28 L 152.92 428.52 H 132.9" /></g><text fill="#101828" font-family="Inter, Lato, Arial, sans-serif" font-size="18" font-weight="800" text-anchor="start" x="175" y="433"><tspan dy="0" x="175">Avgränsa 2–3 flöden</tspan></text><text fill="#475467" font-family="Inter, Lato, Arial, sans-serif" font-size="14" font-weight="400" text-anchor="start" x="175" y="465"><tspan dy="0" x="175">Hög volym, känslig information, tydligt</tspan><tspan dy="16.8" x="175">facksystem</tspan></text><rect fill="#F8FAFC" height="118" rx="18" ry="18" stroke="none" stroke-width="1.0" width="380" x="110" y="532" /><g fill="none" stroke="#245BFF" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2"><circle cx="142" cy="570" r="11.96" /><path d="M 136.8 570.52 L 141.48 575.2 L 149.28 564.28" /></g><text fill="#101828" font-family="Inter, Lato, Arial, sans-serif" font-size="18" font-weight="800" text-anchor="start" x="175" y="575"><tspan dy="0" x="175">Mät baslinje</tspan></text><text fill="#475467" font-family="Inter, Lato, Arial, sans-serif" font-size="14" font-weight="400" text-anchor="start" x="175" y="607"><tspan dy="0" x="175">Volym, ledtid, minuter, frister och</tspan><tspan dy="16.8" x="175">otilldelade ärenden</tspan></text><rect fill="#FFFFFF" filter="url(#cardShadow)" height="485" opacity="0.98" rx="28" ry="28" stroke="#EAECF0" stroke-width="1.0" width="460" x="570" y="245" /><rect fill="#6F42C1" height="8" rx="4" ry="4" width="460" x="570" y="245" /><circle cx="632" cy="317" fill="#F2ECFF" r="30" stroke="none" /><text fill="#6F42C1" font-family="Inter, Lato, Arial, sans-serif" font-size="28" font-weight="900" text-anchor="middle" x="632" y="328"><tspan dy="0" x="632">2</tspan></text><text fill="#101828" font-family="Inter, Lato, Arial, sans-serif" font-size="26" font-weight="900" text-anchor="start" x="675" y="323"><tspan dy="0" x="675">Pilotera &amp; säkra</tspan></text><rect fill="#F2ECFF" height="118" rx="18" ry="18" stroke="none" stroke-width="1.0" width="380" x="610" y="390" /><g fill="none" stroke="#6F42C1" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2"><line x1="632.9" x2="632.9" y1="415.0" y2="441.52" /><path d="M 632.9 415.78 H 652.92 L 647.72 422.28 L 652.92 428.52 H 632.9" /></g><text fill="#101828" font-family="Inter, Lato, Arial, sans-serif" font-size="18" font-weight="800" text-anchor="start" x="675" y="433"><tspan dy="0" x="675">Pilotera Hubs</tspan></text><text fill="#475467" font-family="Inter, Lato, Arial, sans-serif" font-size="14" font-weight="400" text-anchor="start" x="675" y="465"><tspan dy="0" x="675">Åtgärdskö, ärendekoppling, arbetsrum</tspan><tspan dy="16.8" x="675">och kvittens</tspan></text><rect fill="#F8FAFC" height="118" rx="18" ry="18" stroke="none" stroke-width="1.0" width="380" x="610" y="532" /><g fill="none" stroke="#6F42C1" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2"><circle cx="642" cy="570" r="11.96" /><path d="M 636.8 570.52 L 641.48 575.2 L 649.28 564.28" /></g><text fill="#101828" font-family="Inter, Lato, Arial, sans-serif" font-size="18" font-weight="800" text-anchor="start" x="675" y="575"><tspan dy="0" x="675">Säkra kontroller</tspan></text><text fill="#475467" font-family="Inter, Lato, Arial, sans-serif" font-size="14" font-weight="400" text-anchor="start" x="675" y="607"><tspan dy="0" x="675">Behörighet, gallring, logg och</tspan><tspan dy="16.8" x="675">informationsklassning</tspan></text><rect fill="#FFFFFF" filter="url(#cardShadow)" height="485" opacity="0.98" rx="28" ry="28" stroke="#EAECF0" stroke-width="1.0" width="460" x="1070" y="245" /><rect fill="#138A5B" height="8" rx="4" ry="4" width="460" x="1070" y="245" /><circle cx="1132" cy="317" fill="#E8F6EF" r="30" stroke="none" /><text fill="#138A5B" font-family="Inter, Lato, Arial, sans-serif" font-size="28" font-weight="900" text-anchor="middle" x="1132" y="328"><tspan dy="0" x="1132">3</tspan></text><text fill="#101828" font-family="Inter, Lato, Arial, sans-serif" font-size="26" font-weight="900" text-anchor="start" x="1175" y="323"><tspan dy="0" x="1175">Verifiera &amp; skala</tspan></text><rect fill="#E8F6EF" height="118" rx="18" ry="18" stroke="none" stroke-width="1.0" width="380" x="1110" y="390" /><g fill="none" stroke="#138A5B" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2"><line x1="1132.9" x2="1132.9" y1="415.0" y2="441.52" /><path d="M 1132.9 415.78 H 1152.92 L 1147.72 422.28 L 1152.92 428.52 H 1132.9" /></g><text fill="#101828" font-family="Inter, Lato, Arial, sans-serif" font-size="18" font-weight="800" text-anchor="start" x="1175" y="433"><tspan dy="0" x="1175">Verifiera nytta och risk</tspan></text><text fill="#475467" font-family="Inter, Lato, Arial, sans-serif" font-size="14" font-weight="400" text-anchor="start" x="1175" y="465"><tspan dy="0" x="1175">Jämför mot baslinje: tid, ledtid,</tspan><tspan dy="16.8" x="1175">kvalitet och incidenter</tspan></text><rect fill="#F8FAFC" height="118" rx="18" ry="18" stroke="none" stroke-width="1.0" width="380" x="1110" y="532" /><g fill="none" stroke="#138A5B" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2"><circle cx="1142" cy="570" r="11.96" /><path d="M 1136.8 570.52 L 1141.48 575.2 L 1149.28 564.28" /></g><text fill="#101828" font-family="Inter, Lato, Arial, sans-serif" font-size="18" font-weight="800" text-anchor="start" x="1175" y="575"><tspan dy="0" x="1175">Skala till fler roller</tspan></text><text fill="#475467" font-family="Inter, Lato, Arial, sans-serif" font-size="14" font-weight="400" text-anchor="start" x="1175" y="607"><tspan dy="0" x="1175">Datadrivna profiler ovanpå samma</tspan><tspan dy="16.8" x="1175">operativa motor</tspan></text><line fill="none" stroke="#245BFF" stroke-linecap="round" stroke-width="3" x1="538" x2="562" y1="487" y2="487" /><polygon fill="#245BFF" points="562,487 550.7416697508023,493.5 550.7416697508023,480.5" /><line fill="none" stroke="#245BFF" stroke-linecap="round" stroke-width="3" x1="1038" x2="1062" y1="487" y2="487" /><polygon fill="#245BFF" points="1062,487 1050.7416697508022,493.5 1050.7416697508022,480.5" /><rect fill="#EAF0FF" height="46" rx="20" ry="20" stroke="none" stroke-width="1.0" width="1460" x="70" y="770" /><text fill="#245BFF" font-family="Inter, Lato, Arial, sans-serif" font-size="18" font-weight="800" text-anchor="start" x="105" y="800"><tspan dy="0" x="105">Inför som produktivitets- och rättssäkerhetsprogram – inte som en bred big-bang-implementation.</tspan></text><line stroke="#EAECF0" stroke-width="1" x1="70" x2="1530" y1="830" y2="830" /><text fill="#667085" font-family="Inter, Lato, Arial, sans-serif" font-size="14" font-weight="400" text-anchor="start" x="70" y="862"><tspan dy="0" x="70">Caption: Hubs bör införas stegvis: avgränsa flöden, mät baslinje, pilotera, verifiera nytta/risk och skala till fler roller.</tspan></text></svg>