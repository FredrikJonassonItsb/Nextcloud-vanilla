# ITSL Open Stack — compose stack (CONTRACTS §4)
# Lives on dev15 at /opt/openstack/stack, project name "openstack".
# Env is read from /opt/openstack/.env via `docker compose --env-file` (deploy.sh does this).
# Only 8843 (caddy TLS), 8790 (capture-bot) and 8791 (runner) are published on the host.

name: openstack

x-brain-env: &brain-env
  OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
  EMBED_MODEL: ${EMBED_MODEL:-openai/text-embedding-3-small}
  PII_PATTERNS_PATH: /app/pii-patterns.json
  # PII write firewall. Default on; PII_FIREWALL_ENABLED=0 accepts everything.
  PII_FIREWALL_ENABLED: ${PII_FIREWALL_ENABLED:-1}

x-brain-service: &brain-service
  build: ../openbrain-svc
  restart: unless-stopped
  networks: [openstack]
  depends_on:
    brain-db:
      condition: service_healthy
  volumes:
    - ./shared/pii-patterns.json:/app/pii-patterns.json:ro

services:
  brain-db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    networks: [openstack]
    # No host port — DB is reachable only inside the compose network.
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?generated by deploy.sh}
      # Role passwords consumed by init/00-init.sh (first boot + idempotent re-runs)
      DB_PASS_REB: ${DB_PASS_REB:?}
      DB_PASS_ATLAS: ${DB_PASS_ATLAS:?}
      DB_PASS_ADA: ${DB_PASS_ADA:?}
      DB_PASS_MARVIN: ${DB_PASS_MARVIN:?}
      DB_PASS_TEAM: ${DB_PASS_TEAM:?}
      DB_PASS_ENGINE: ${DB_PASS_ENGINE:?}
    volumes:
      - braindb:/var/lib/postgresql/data
      - ./brain-db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  brain-reb:
    <<: *brain-service
    environment:
      <<: *brain-env
      PORT: "7101"
      DATABASE_URL: postgresql://u_reb:${DB_PASS_REB:?}@brain-db:5432/brain_reb
      BRAIN_KEY: ${BRAIN_KEY_REB:?}
    expose: ["7101"]
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:7101/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  brain-atlas:
    <<: *brain-service
    environment:
      <<: *brain-env
      PORT: "7102"
      DATABASE_URL: postgresql://u_atlas:${DB_PASS_ATLAS:?}@brain-db:5432/brain_atlas
      BRAIN_KEY: ${BRAIN_KEY_ATLAS:?}
    expose: ["7102"]
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:7102/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  brain-ada:
    <<: *brain-service
    environment:
      <<: *brain-env
      PORT: "7103"
      DATABASE_URL: postgresql://u_ada:${DB_PASS_ADA:?}@brain-db:5432/brain_ada
      BRAIN_KEY: ${BRAIN_KEY_ADA:?}
    expose: ["7103"]
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:7103/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  brain-marvin:
    <<: *brain-service
    environment:
      <<: *brain-env
      PORT: "7104"
      DATABASE_URL: postgresql://u_marvin:${DB_PASS_MARVIN:?}@brain-db:5432/brain_marvin
      BRAIN_KEY: ${BRAIN_KEY_MARVIN:?}
    expose: ["7104"]
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:7104/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  brain-team:
    <<: *brain-service
    environment:
      <<: *brain-env
      PORT: "7105"
      DATABASE_URL: postgresql://u_team:${DB_PASS_TEAM:?}@brain-db:5432/brain_team
      BRAIN_KEY: ${BRAIN_KEY_TEAM:?}
    expose: ["7105"]
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:7105/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  caddy:
    image: caddy:2
    restart: unless-stopped
    networks: [openstack]
    ports:
      - "8843:8843"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy/healthz.txt:/etc/caddy/healthz.txt:ro
      # CERT_DIR is set by deploy.sh (LE cert copy, or self-signed fallback)
      - ${CERT_DIR:?set by deploy.sh}:/certs:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - brain-reb
      - brain-atlas
      - brain-ada
      - brain-marvin
      - brain-team
    healthcheck:
      # /ping is served by caddy itself (no upstream involved)
      test: ["CMD", "wget", "-q", "--no-check-certificate", "-O", "/dev/null", "https://127.0.0.1:8843/ping"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  capture-bot:
    build: ../capture-bot
    restart: unless-stopped
    networks: [openstack]
    ports:
      - "8790:8790"
    depends_on:
      brain-db:
        condition: service_healthy
      brain-reb:
        condition: service_started
      brain-team:
        condition: service_started
    volumes:
      - ./shared/pii-patterns.json:/app/pii-patterns.json:ro
      # room -> brain routing, generated by occ-provision (placeholder '{}' until then)
      - ../capture-bot/rooms.json:/app/rooms.json:ro
    environment:
      PORT: "8790"
      NC_BASE: ${NC_BASE:-https://dev15.hubs.se}
      ROOMS_PATH: /app/rooms.json
      PII_PATTERNS_PATH: /app/pii-patterns.json
      PII_FIREWALL_ENABLED: ${PII_FIREWALL_ENABLED:-1}
      # Talk bot HMAC secrets (one per room bot)
      TALK_BOT_SECRET_REB: ${TALK_BOT_SECRET_REB:-}
      TALK_BOT_SECRET_ATLAS: ${TALK_BOT_SECRET_ATLAS:-}
      TALK_BOT_SECRET_ADA: ${TALK_BOT_SECRET_ADA:-}
      TALK_BOT_SECRET_MARVIN: ${TALK_BOT_SECRET_MARVIN:-}
      # bot-engine app password (for !queue -> Deck REST and !status -> agent_engine OCS)
      BOT_APP_PASSWORD_ENGINE: ${BOT_APP_PASSWORD_ENGINE:-}
      # dedupe store (engine_meta.capture_seen) — code reads DATABASE_URL
      DATABASE_URL: postgresql://svc_engine:${DB_PASS_ENGINE:?}@brain-db:5432/engine_meta
      # brain ingest endpoints (internal network) + bearer keys
      BRAIN_URL_REB: http://brain-reb:7101
      BRAIN_URL_ATLAS: http://brain-atlas:7102
      BRAIN_URL_ADA: http://brain-ada:7103
      BRAIN_URL_MARVIN: http://brain-marvin:7104
      BRAIN_URL_TEAM: http://brain-team:7105
      BRAIN_KEY_REB: ${BRAIN_KEY_REB:?}
      BRAIN_KEY_ATLAS: ${BRAIN_KEY_ATLAS:?}
      BRAIN_KEY_ADA: ${BRAIN_KEY_ADA:?}
      BRAIN_KEY_MARVIN: ${BRAIN_KEY_MARVIN:?}
      BRAIN_KEY_TEAM: ${BRAIN_KEY_TEAM:?}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8790/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  runner:
    build: ../runner
    restart: unless-stopped
    networks: [openstack]
    ports:
      - "8791:8791"
    depends_on:
      brain-db:
        condition: service_healthy
    environment:
      PORT: "8791"
      NC_BASE: ${NC_BASE:-https://dev15.hubs.se}
      # cron loop is gated on RUNNER_ENABLED=1 AND a non-empty ANTHROPIC_API_KEY (CONTRACTS §4)
      RUNNER_ENABLED: ${RUNNER_ENABLED:-0}
      RUNNER_DAILY_USD_CAP: ${RUNNER_DAILY_USD_CAP:-10}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # HMAC verification for POST /wake/{agentCode} from agent_engine
      ENGINE_PUSH_SECRET: ${ENGINE_PUSH_SECRET:?}
      # bot app passwords for engine-api.sh (claim/receipt/ledger/origin-note)
      BOT_APP_PASSWORD_REB: ${BOT_APP_PASSWORD_REB:-}
      BOT_APP_PASSWORD_ATLAS: ${BOT_APP_PASSWORD_ATLAS:-}
      BOT_APP_PASSWORD_ADA: ${BOT_APP_PASSWORD_ADA:-}
      BOT_APP_PASSWORD_MARVIN: ${BOT_APP_PASSWORD_MARVIN:-}
      # brain-api.sh (recall/writeback against own brain + team brain)
      BRAIN_URL_REB: http://brain-reb:7101
      BRAIN_URL_ATLAS: http://brain-atlas:7102
      BRAIN_URL_ADA: http://brain-ada:7103
      BRAIN_URL_MARVIN: http://brain-marvin:7104
      BRAIN_URL_TEAM: http://brain-team:7105
      BRAIN_KEY_REB: ${BRAIN_KEY_REB:?}
      BRAIN_KEY_ATLAS: ${BRAIN_KEY_ATLAS:?}
      BRAIN_KEY_ADA: ${BRAIN_KEY_ADA:?}
      BRAIN_KEY_MARVIN: ${BRAIN_KEY_MARVIN:?}
      BRAIN_KEY_TEAM: ${BRAIN_KEY_TEAM:?}
      # cost log + run journal (engine_meta.run_log / kv). run-agent.sh reads
      # ENGINE_META_DSN — the daily USD cap is NOT enforced without it.
      ENGINE_META_DSN: postgresql://svc_engine:${DB_PASS_ENGINE:?}@brain-db:5432/engine_meta
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8791/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  backup:
    build: ./backup
    restart: unless-stopped
    networks: [openstack]
    depends_on:
      brain-db:
        condition: service_healthy
    environment:
      PGHOST: brain-db
      PGUSER: postgres
      PGPASSWORD: ${POSTGRES_PASSWORD:?}
      RETENTION_DAYS: "14"
    volumes:
      # host path on dev15: /opt/openstack/backups (created by deploy.sh)
      - ../backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pgrep crond >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Native källinhämtning (batch, source-connector-contract). Startar INTE med
  # `up -d` (profiles: ingestion) — körs on-demand:
  #   docker compose --profile ingestion run --rm ingestion \
  #     extract --source zammad --brain marvin --pseudonymize --since 30d
  ingestion:
    build: ../ingestion
    profiles: ["ingestion"]
    networks: [openstack]
    depends_on:
      brain-db:
        condition: service_healthy
    environment:
      ZAMMAD_TOKEN: ${ZAMMAD_TOKEN:-}
      ZAMMAD_BASE_URL: ${ZAMMAD_BASE_URL:-https://zammad.itsl.se}
      INGEST_SINCE: ${INGEST_SINCE:-1y}
      INGEST_EXPERT_NAMES: ${INGEST_EXPERT_NAMES:-johan}
      INGEST_DATA_DIR: /app/data
      # brain-mål: samma interna endpoints + nycklar som capture-bot
      BRAIN_URL_REB: http://brain-reb:7101
      BRAIN_URL_ATLAS: http://brain-atlas:7102
      BRAIN_URL_ADA: http://brain-ada:7103
      BRAIN_URL_MARVIN: http://brain-marvin:7104
      BRAIN_URL_TEAM: http://brain-team:7105
      BRAIN_KEY_REB: ${BRAIN_KEY_REB:-}
      BRAIN_KEY_ATLAS: ${BRAIN_KEY_ATLAS:-}
      BRAIN_KEY_ADA: ${BRAIN_KEY_ADA:-}
      BRAIN_KEY_MARVIN: ${BRAIN_KEY_MARVIN:-}
      BRAIN_KEY_TEAM: ${BRAIN_KEY_TEAM:-}
    volumes:
      - ingestion-data:/app/data

networks:
  openstack:
    name: openstack

volumes:
  braindb:
    name: openstack_braindb
  caddy_data:
  caddy_config:
  ingestion-data:
    name: openstack_ingestion_data
